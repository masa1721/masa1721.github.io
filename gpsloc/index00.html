<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GPS AR 日本語テキスト表示</title>
    <!-- A-Frame itself -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- Pure three.js code that the A-Frame components use for location-based AR -->
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>

    <!-- AR.js A-Frame components -->
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>

  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer='antialias: true; alpha: true'>

    <!-- カメラ（位置情報を取得） -->
      <a-camera gps-new-camera='gpsMinDistance: 10' rotation-reader></a-camera>

      <!-- 日本語テキストを現在地に配置: 準備室(37.956062, 139.337645) -->

      <a-entity
        gps-new-entity-place="latitude: 37.956062; longitude: 139.337645"
        text="value: ここは新発田市です！; color: red; align: center;"
        scale="10 10 10">
      </a-entity>
      
      <a-entity material='color: red' geometry='primitive: box'
        gps-new-entity-place="latitude: 37.956062; longitude: 139.337645"
        scale="10 10 10">
      </a-entity>
      
    </a-scene>

    <script>
      //Geolocationで現在地を取得する
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(function(position) {
          console.log('現在地の緯度: ' + position.coords.latitude);
          console.log('現在地の経度: ' + position.coords.longitude);
        });
      } else {
        console.log('Geolocationはサポートされていません。');
      }

      // 現在地の緯度経度を取得して、テキストの位置を更新する
      function updateTextPosition() {
        if ('geolocation' in navigator) {
          navigator.geolocation.getCurrentPosition(function(position) {
            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;

            // テキストの位置を更新する
            var textEntity = document.querySelector('a-entity[text]');
            textEntity.setAttribute('gps-new-entity-place', 'latitude: ' + latitude + '; longitude: ' + longitude);
          });
        }
      }

      // boxの位置も更新する
      function updateBoxPosition() {
        if ('geolocation' in navigator) {
          navigator.geolocation.getCurrentPosition(function(position) {
            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;

            // boxの位置を更新する
            var boxEntity = document.querySelector('a-entity[geometry]');
            boxEntity.setAttribute('gps-new-entity-place', 'latitude: ' + latitude + '; longitude: ' + longitude);
          });
        }
      }

      // 5秒ごとにテキストとボックスの位置を更新する
      setInterval(updateTextPosition, 5000);
      setInterval(updateBoxPosition, 5000);

    </script>
  </body>
</html>
