<!DOCTYPE html>
<html>
<head>
<title>AR.js A-Frame Location-based</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
<script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
</head>
<body>
<a-scene vr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
   renderer='antialias: true; alpha: true'>
    <a-camera gps-new-camera='gpsMinDistance: 5' rotation-reader></a-camera>
    <!-- a-entity で新発田市役所 -->
    <a-entity material='color: red' geometry='primitive: sphere; radius: 180'
        gps-new-entity-place="latitude: 37.9479537; longitude: 139.3269729" position="0 80 0">
    </a-entity>
    
    <!-- 新発田市役所 -->
    <a-box material="color: yellow" gps-new-entity-place="latitude: 37.9479537; longitude: 139.3269729" scale="300 300 300">
    </a-box>

    <!-- 白壁兵舎 -->
    <a-text value="WHITE Wall HOUSE" look-at="[gps-camera]" scale="100000 100000 100000" color="red"
        gps-new-entity-place="latitude: 37.954346; longitude: 139.322443;" position="0 100 0">
    </a-text>
    <a-box material="color: purple" gps-new-entity-place="latitude: 37.954346; longitude: 139.322443" scale="600 600 600">
    </a-box>
   
    <!-- 短大 -->
    <a-text value="Niigata College" look-at="[gps-camera]" scale="30 30 30" color="green"
        gps-new-entity-place="latitude: 37.9565223; longitude: 139.3372224;" position="0 10 0">
    </a-text>
   
    <!-- JR新発田駅 -->
    <a-box material="color: green" gps-new-entity-place="latitude: 37.944171; longitude: 139.334887" scale="200 200 200">
    </a-box>

    <!-- 新発田城 -->
    <a-box material="color: red" gps-new-entity-place="latitude: 37.9547987; longitude: 139.3259709" scale="300 300 300"/>


</a-scene>
</body>
</html>
