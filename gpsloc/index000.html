<!DOCTYPE html>
<html>
<head>
<title>AR.js A-Frame Location-based</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
<script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
<style>
   .ar-ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10; /* A-Frameのキャンバス(通常z-indexなし)より前面に配置 */
      pointer-events: none; /* UIの透明な部分がARのクリック操作を邪魔しないようにする */
      font-family: sans-serif;
    }
   .fixed-text {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 100px;
      background: rgba(1, 0, 0, 0.6); /* 半透明の黒背景 */
      color: #ffffff;
      padding: 10px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>
<!-- HTML/CSSによる画面固定のUI要素 -->
  <div class="ar-ui-container">
    <div class="fixed-text">[位置情報] 緯度:36.1234  経度:139.3456  高度: 8.5m</div>
  </div>   
<a-scene xr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
   renderer='antialias: true; alpha: true'>
    <a-camera gps-new-camera='gpsMinDistance: 5' rotation-reader></a-camera>
   
    <!-- a-entity で新発田市役所 -->
    <a-entity material='color: red' geometry='primitive: sphere; radius: 180'
        gps-new-entity-place="latitude: 37.9479537; longitude: 139.3269729" position="0 400 0">
    </a-entity>
   
    <!-- 新発田市役所 -->
    <a-box material="color: yellow" gps-new-entity-place="latitude: 37.9479537; longitude: 139.3269729" scale="300 300 300">
    </a-box>

    <!-- 白壁兵舎 -->
    <a-text value="WHITE Wall HOUSE" look-at="[gps-new-camera]" scale="600 600 600" color="red"
        gps-new-entity-place="latitude: 37.954346; longitude: 139.322443;" position="0 200 0">
    </a-text>
    <a-box material="color: purple" gps-new-entity-place="latitude: 37.954346; longitude: 139.322443"
       scale="200 200 200" position="0 -300 0">
    </a-box>
   
    <!-- 新潟職能短大 -->
    <a-text value="Niigata College" look-at="[gps-camera]" scale="30 30 30" color="green"
        gps-new-entity-place="latitude: 37.9565223; longitude: 139.3372224;" position="0 20 0">
    </a-text>
    <!-- ウオロク緑店 -->
    <a-text value="UOROKU Green Cort" look-at="[gps-camera]" scale="60 60 60" color="green"
        gps-new-entity-place="latitude: 37.956247; longitude: 139.336089;" position="0 0 0">
    </a-text>
   
    <!-- JR新発田駅 -->
    <a-box material="color: green" gps-new-entity-place="latitude: 37.944171; longitude: 139.334887" scale="200 200 200">
    </a-box>

    <!-- 新発田城 -->
    <a-box material="color: blue" gps-new-entity-place="latitude: 37.9547987; longitude: 139.3259709" scale="200 200 200">
    </a-box>
    
</a-scene>
</body>
</html>
